name: trolley_buddy
description: A smart grocery shopping app with QR scanning, navigation, and automatic billing.

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.6
  google_nav_bar: ^5.0.6
  flutter_svg: ^2.1.1

  # QR Code & Barcode Scanning
  mobile_scanner: ^3.5.6
  permission_handler: ^12.0.1


  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  geocoding: ^3.0.0

  # State Management
  provider: ^6.1.5
  shared_preferences: ^2.3.1

  # HTTP & API
  http: ^1.1.1
  dio: ^5.3.3

  # Payment Integration
  flutter_stripe: ^9.0.0
  razorpay_flutter: ^1.3.7

  # Database
  sqflite: ^2.3.0

  # Image & Camera
  image_picker: ^1.0.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  # Commented out for now (you can re-enable once you add assets/fonts)
